services:
  access-to-sqlite:
    build: .
    image: ghcr.io/ropean/access-to-sqlite:latest
    container_name: access-to-sqlite
    restart: unless-stopped
    ports:
      - "5014:5014"
    environment:
      PORT: 5014
      # Max upload size in bytes (default 20 MB).
      MAX_UPLOAD: 20971520
    tmpfs:
      # Keep uploaded files + intermediate SQLite in RAM; nothing persists.
      - /tmp
